# Project/container prefix — override by setting PROJECT_PREFIX in .env;
# defaults to deep-research-backend if unset. This, not the checkout
# directory name, is what prefixes every container/volume/network below
# (e.g. `docker ps` shows `${PROJECT_PREFIX}-api`, `${PROJECT_PREFIX}-postgres`,
# ...) — stable and greppable on a shared host no matter what the repo's
# local folder is named, and distinguishable if you ever run two checkouts
# side by side with different PROJECT_PREFIX values.
name: ${PROJECT_PREFIX:-deep-research-backend}

services:
  # postgres, searxng, and crawl4ai are internal-only: no `ports:` mapping,
  # so nothing outside the compose network can reach them — only `api`/
  # `worker` need to, over the internal service DNS names below. `api`
  # (port 8000) is the one service meant to be reachable from outside.
  #
  # `api`/`worker` load `.env` first (`env_file:`), then `environment:`
  # overrides DATABASE_URL/SEARXNG_URL/CRAWL4AI_URL specifically to the
  # internal service names — the localhost-based values in `.env.example`
  # only apply if you run the app directly on the host instead of via this
  # compose file (BUILD.md §2).
  postgres:
    # Official image, not vendored — ARCHITECTURE.md §13.1.
    image: pgvector/pgvector:pg16
    container_name: ${PROJECT_PREFIX:-deep-research-backend}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deep_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vendored, not pulled prebuilt — ARCHITECTURE.md §13.2. Requires the
  # vendor/searxng submodule to be populated first (see its README).
  #
  # SearXNG's own build is split across two Dockerfiles with a cross-image
  # dependency that plain `docker compose build` can't express, so
  # docker/searxng/Dockerfile merges them into one multi-stage build —
  # see the comment at the top of that file.
  searxng:
    build:
      context: ./vendor/searxng
      dockerfile: ../../docker/searxng/Dockerfile
    container_name: ${PROJECT_PREFIX:-deep-research-backend}-searxng
    restart: unless-stopped
    environment:
      # SEARXNG_SECRET must be set in .env for a real deployment — see
      # .env.example. Overrides the settings.yml placeholder at runtime.
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    volumes:
      # search.formats: [html, json] — our SearchProvider needs JSON output,
      # which upstream's default settings.yml disables. See the file itself.
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Vendored, not pulled prebuilt — ARCHITECTURE.md §13.2. Requires the
  # vendor/crawl4ai submodule to be populated first (see its README). Its
  # own Dockerfile is self-contained (single build context, no wrapper
  # needed, unlike searxng above).
  crawl4ai:
    build:
      context: ./vendor/crawl4ai
    container_name: ${PROJECT_PREFIX:-deep-research-backend}-crawl4ai
    restart: unless-stopped
    environment:
      # Without this, Crawl4AI's own entrypoint refuses to bind beyond
      # 127.0.0.1 — unreachable from api/worker over the docker network
      # even though nothing outside this compose network can reach it
      # either way. Also enforced as a Bearer auth header on every request
      # (vendor/crawl4ai/deploy/docker/entrypoint.sh, auth_gate.py).
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:?set CRAWL4AI_API_TOKEN in .env}
    # Chromium needs real shared memory; upstream's own compose file uses
    # the same value. Memory limits mirror upstream's defaults too — its
    # healthcheck fails startup if it sees less than 2GB available.
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Opt-in — only built/started when the "proxy" profile is active (set
  # COMPOSE_PROFILES=proxy in .env, or pass --profile proxy). Converts
  # OUTBOUND_PROXY_URL=vless://... into a local xray-core SOCKS5 proxy that
  # api/worker/crawl4ai all reach at socks5://xray:1080 over this compose
  # network — see docker/xray/ for why this needs to be its own service
  # rather than something api/worker spawn themselves (crawl4ai forwards
  # the proxy address to its own outbound fetch, so it needs a network-
  # reachable address, not a loopback one; worker is also scaled, so a
  # per-replica subprocess wouldn't have a stable address either). Not
  # wired up via `depends_on` from api/worker/crawl4ai: those depend on a
  # profile-gated service only when an operator actually enables it, and
  # depends_on can't express "only if the profile is active".
  xray:
    build: ./docker/xray
    container_name: ${PROJECT_PREFIX:-deep-research-backend}-xray
    restart: unless-stopped
    profiles: ["proxy"]
    environment:
      OUTBOUND_PROXY_URL: ${OUTBOUND_PROXY_URL}
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 1080), 2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build: .
    container_name: ${PROJECT_PREFIX:-deep-research-backend}-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deep_research
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
    ports:
      # Host-side port only — the app inside the container always listens
      # on 8000 (Dockerfile CMD); only which host port reaches it changes.
      # Override via API_PORT in .env, e.g. to avoid colliding with other
      # projects on a shared host.
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy

  worker:
    build: .
    # No container_name: a fixed name can't be reused across replicas, and
    # this service is scaled (see below) — it still gets the same
    # ${PROJECT_PREFIX}-worker-N prefix automatically from `name:` above.
    command: ["python", "-m", "app.worker_main"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deep_research
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
    depends_on:
      postgres:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
    # Stateless — scale with: docker compose up --scale worker=3

volumes:
  postgres_data:
