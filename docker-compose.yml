# Explicit project name — this, not the checkout directory name, is what
# prefixes every container/volume/network below (e.g. `docker ps` shows
# `deep-research-backend-api-1`, `deep-research-backend-postgres-1`, ...).
# Keeps that prefix stable and greppable on a shared host no matter what
# the repo's local folder is named.
name: deep-research-backend

services:
  # postgres, searxng, and crawl4ai are internal-only: no `ports:` mapping,
  # so nothing outside the compose network can reach them — only `api`/
  # `worker` need to, over the internal service DNS names below. `api`
  # (port 8000) is the one service meant to be reachable from outside.
  #
  # `api`/`worker` load `.env` first (`env_file:`), then `environment:`
  # overrides DATABASE_URL/SEARXNG_URL/CRAWL4AI_URL specifically to the
  # internal service names — the localhost-based values in `.env.example`
  # only apply if you run the app directly on the host instead of via this
  # compose file (BUILD.md §2).
  postgres:
    # Official image, not vendored — ARCHITECTURE.md §13.1.
    image: pgvector/pgvector:pg16
    container_name: deep-research-backend-postgres
    environment:
      POSTGRES_DB: deep_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vendored, not pulled prebuilt — ARCHITECTURE.md §13.2. Requires the
  # vendor/searxng submodule to be populated first (see its README).
  searxng:
    build:
      context: ./vendor/searxng
    container_name: deep-research-backend-searxng

  # Vendored, not pulled prebuilt — ARCHITECTURE.md §13.2. Requires the
  # vendor/crawl4ai submodule to be populated first (see its README).
  crawl4ai:
    build:
      context: ./vendor/crawl4ai
    container_name: deep-research-backend-crawl4ai

  api:
    build: .
    container_name: deep-research-backend-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deep_research
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    # No container_name: a fixed name can't be reused across replicas, and
    # this service is scaled (see below) — it still gets the same
    # deep-research-backend-worker-N prefix automatically from `name:` above.
    command: ["python", "-m", "app.worker_main"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deep_research
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
    depends_on:
      postgres:
        condition: service_healthy
    # Stateless — scale with: docker compose up --scale worker=3

volumes:
  postgres_data:
